<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LóbiLóbi - Galinhada!</title>
    
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        /* CSS GERAL */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2ecc71; color: white; overflow: hidden; }
        
        /* TELAS */
        #host-screen, #client-screen { display: none; width: 100vw; height: 100vh; }
        
        /* ================= TELA DO PC (HOST) ================= */
        #host-screen { flex-direction: column; align-items: center; justify-content: center; background: #27ae60; }
        #game-header { width: 800px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; }
        #scoreboard h2, #timer { margin: 0; font-size: 24px; }
        #game-canvas { background-color: #82ccdd; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 5px solid #2c3e50; }
        
        /* Painel do QR Code */
        #qr-panel { position: absolute; right: 20px; top: 20px; background: white; padding: 15px; border-radius: 10px; color: black; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        #qr-panel h3 { margin-bottom: 10px; font-size: 16px; }
        
        /* Modal de Fim de Jogo */
        #game-over-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #f1c40f; color: #2c3e50; padding: 40px; border-radius: 20px; text-align: center; border: 5px solid #e67e22; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* ================= TELA DO CELULAR (CLIENTE) ================= */
        #client-screen { flex-direction: column; background: #2c3e50; justify-content: space-between; }
        #client-header { text-align: center; padding: 15px; background: #34495e; font-size: 20px; font-weight: bold; }
        #client-status { font-size: 14px; color: #f1c40f; margin-top: 5px; }
        
        /* Controles Touch */
        #controls { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; flex: 1; }
        
        /* D-PAD */
        .dpad { display: grid; grid-template-columns: 70px 70px 70px; grid-template-rows: 70px 70px 70px; gap: 5px; }
        .d-btn { background: rgba(255,255,255,0.2); border-radius: 15px; border: 2px solid rgba(255,255,255,0.4); display: flex; justify-content: center; align-items: center; font-size: 30px; border-bottom: 5px solid rgba(0,0,0,0.3); }
        .d-btn:active { background: rgba(255,255,255,0.5); transform: translateY(3px); border-bottom: 2px solid rgba(0,0,0,0.3); }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }
        
        /* Botão de Ação */
        #btn-action { width: 100px; height: 100px; border-radius: 50%; background: #e74c3c; border: 3px solid #c0392b; border-bottom: 8px solid #900; color: white; font-size: 40px; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        #btn-action:active { transform: translateY(5px); border-bottom: 3px solid #900; background: #c0392b; }
        
        .loading { display: flex; justify-content: center; align-items: center; height: 100vh; font-size: 24px; }
    </style>
</head>
<body>

    <div id="host-screen">
        <div id="game-header">
            <div id="scoreboard">Jogadores conectados: 0</div>
            <div id="timer">⏱️ 90s</div>
        </div>
        <canvas id="game-canvas" width="800" height="600"></canvas>
        
        <div id="qr-panel">
            <h3>Jogue pelo Celular!</h3>
            <div id="qrcode"></div>
            <small style="display:block; margin-top:5px; font-size:11px; color:#555;">Escaneie para entrar</small>
        </div>

        <div id="game-over-modal">
            <h1>Fim de Jogo! 🏆</h1>
            <h2 id="winner-text" style="margin: 20px 0;"></h2>
            <p>Recarregue a página (F5) para jogar novamente.</p>
        </div>
    </div>

    <div id="client-screen">
        <div id="client-header">
            LóbiLóbi <br>
            <span id="client-status">⏳ Conectando à fazenda...</span>
        </div>
        
        <div id="controls">
            <div class="dpad">
                <div class="d-btn" id="btn-up">⬆️</div>
                <div class="d-btn" id="btn-left">⬅️</div>
                <div class="d-btn" id="btn-right">➡️</div>
                <div class="d-btn" id="btn-down">⬇️</div>
            </div>
            <div id="btn-action">🐔</div>
        </div>
    </div>

    <div id="loading" class="loading">Iniciando LóbiLóbi...</div>

    <script>
        // ================= LÓGICA DE ROTINAS E MODO =================
        const urlParams = new URLSearchParams(window.location.search);
        const hostIdToJoin = urlParams.get('join');
        
        document.getElementById('loading').style.display = 'none';

        if (hostIdToJoin) {
            initClientMode(hostIdToJoin);
        } else {
            initHostMode();
        }

        // ================= CÓDIGO DO HOST (PC / TELA) =================
        function initHostMode() {
            document.getElementById('host-screen').style.display = 'flex';
            
            const peer = new Peer();
            let hostId = null;
            let players = {};
            let gameStarted = false;
            let timeRemaining = 90;
            let lastTime = 0;

            // Variáveis do Jogo
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const cw = canvas.width;
            const ch = canvas.height;

            // Elementos do Mapa
            const barn = { x: cw / 2, y: 100, radius: 60 };
            const chickens = [];
            const obstacles = [];

            // Gerar Galinhas
            for(let i=0; i<5; i++) spawnChicken();

            // Gerar Obstáculos (Árvores e pedras)
            for(let i=0; i<6; i++) {
                obstacles.push({
                    x: Math.random() * (cw - 100) + 50,
                    y: Math.random() * (ch - 200) + 150,
                    emoji: Math.random() > 0.5 ? '🌳' : '🪨',
                    radius: 20
                });
            }

            peer.on('open', (id) => {
                hostId = id;
                console.log("Host criado! ID:", hostId);
                
                // Monta a URL de entrada (URL atual + ?join=ID)
                const joinUrl = window.location.origin + window.location.pathname + "?join=" + hostId;
                
                // Gera o QR Code
                new QRCode(document.getElementById("qrcode"), {
                    text: joinUrl,
                    width: 150,
                    height: 150
                });
            });

            // Quando um celular se conecta
            peer.on('connection', (conn) => {
                const playerId = conn.peer;
                
                // Cria o jogador
                players[playerId] = {
                    x: Math.random() * (cw - 100) + 50,
                    y: ch - 50,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`, // Identificador visual
                    score: 0,
                    hasChicken: false,
                    speed: 4,
                    inputs: { up: false, down: false, left: false, right: false, action: false },
                    conn: conn
                };

                updateScoreboard();

                // Recebe os inputs do celular
                conn.on('data', (data) => {
                    if (data.type === 'input' && players[playerId]) {
                        players[playerId].inputs = data.state;
                    }
                });

                conn.on('close', () => {
                    delete players[playerId];
                    updateScoreboard();
                });

                // Inicia o timer se for o primeiro jogador
                if (!gameStarted) {
                    gameStarted = true;
                    startTimer();
                }
            });

            function startTimer() {
                const timerInterval = setInterval(() => {
                    timeRemaining--;
                    document.getElementById('timer').innerText = `⏱️ ${timeRemaining}s`;
                    if (timeRemaining <= 0) {
                        clearInterval(timerInterval);
                        endGame();
                    }
                }, 1000);
            }

            function updateScoreboard() {
                let html = '<h2>Pontuações:</h2>';
                for (let id in players) {
                    html += `<span style="color:${players[id].color}; font-weight:bold; margin-right: 15px;">👨‍🌾: ${players[id].score}</span>`;
                }
                if (Object.keys(players).length === 0) html = "Aguardando fazendeiros...";
                document.getElementById('scoreboard').innerHTML = html;
            }

            function spawnChicken() {
                chickens.push({
                    x: Math.random() * (cw - 100) + 50,
                    y: Math.random() * (ch - 200) + 150, // Evita nascer em cima do celeiro
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    radius: 15,
                    timer: 0
                });
            }

            function updatePhysics() {
                if (timeRemaining <= 0) return;

                // Move Jogadores
                for (let id in players) {
                    let p = players[id];
                    let currentSpeed = p.hasChicken ? p.speed * 0.5 : p.speed; // Fica lento com galinha
                    
                    if (p.inputs.up) p.y -= currentSpeed;
                    if (p.inputs.down) p.y += currentSpeed;
                    if (p.inputs.left) p.x -= currentSpeed;
                    if (p.inputs.right) p.x += currentSpeed;

                    // Limites da tela
                    p.x = Math.max(20, Math.min(cw - 20, p.x));
                    p.y = Math.max(20, Math.min(ch - 20, p.y));

                    // Lógica de Ação (Pegar/Entregar Galinha)
                    if (p.inputs.action) {
                        // 1. Tentar pegar galinha
                        if (!p.hasChicken) {
                            for (let i = 0; i < chickens.length; i++) {
                                let c = chickens[i];
                                let dist = Math.hypot(p.x - c.x, p.y - c.y);
                                if (dist < p.radius + c.radius + 30) { // +30 é a margem de acerto
                                    p.hasChicken = true;
                                    chickens.splice(i, 1); // Remove galinha do mapa
                                    p.conn.send({type: 'status', msg: '🐓 Levando pro celeiro!'});
                                    break;
                                }
                            }
                        }
                    }

                    // 2. Entregar no Celeiro (Automático ao encostar com a galinha)
                    if (p.hasChicken) {
                        let distToBarn = Math.hypot(p.x - barn.x, p.y - barn.y);
                        if (distToBarn < barn.radius + 20) {
                            p.hasChicken = false;
                            p.score++;
                            updateScoreboard();
                            spawnChicken(); // Spawna uma nova
                            p.conn.send({type: 'status', msg: '✨ Ponto! Pegue outra!'});
                        }
                    }
                    
                    p.radius = 20; // tamanho do hitbox do player
                }

                // IA das Galinhas
                chickens.forEach(c => {
                    // Muda de direção aleatoriamente
                    c.timer++;
                    if (c.timer > 60) {
                        c.vx = (Math.random() - 0.5) * 3;
                        c.vy = (Math.random() - 0.5) * 3;
                        c.timer = 0;
                    }

                    // Fuga simples se jogador chegar perto
                    for(let id in players) {
                        let p = players[id];
                        let dist = Math.hypot(p.x - c.x, p.y - c.y);
                        if (dist < 100 && !p.hasChicken) {
                            c.vx = (c.x - p.x) * 0.05;
                            c.vy = (c.y - p.y) * 0.05;
                        }
                    }

                    c.x += c.vx;
                    c.y += c.vy;

                    // Borda
                    if(c.x < 20 || c.x > cw-20) c.vx *= -1;
                    if(c.y < 20 || c.y > ch-20) c.vy *= -1;
                });
            }

            function draw(time) {
                // Background
                ctx.fillStyle = '#78e08f';
                ctx.fillRect(0, 0, cw, ch);

                // Celeiro
                ctx.font = '80px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🏠', barn.x, barn.y);
                
                // Zona de entrega
                ctx.beginPath();
                ctx.arc(barn.x, barn.y, barn.radius, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 5;
                ctx.setLineDash([10, 10]);
                ctx.stroke();
                ctx.setLineDash([]);

                // Obstáculos
                ctx.font = '40px Arial';
                obstacles.forEach(o => {
                    ctx.fillText(o.emoji, o.x, o.y);
                });

                // Galinhas
                ctx.font = '30px Arial';
                chickens.forEach(c => {
                    ctx.fillText('🐔', c.x, c.y);
                });

                // Jogadores
                for (let id in players) {
                    let p = players[id];
                    ctx.font = '40px Arial';
                    
                    // Desenha aura da cor do jogador
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 25, 0, Math.PI*2);
                    ctx.fillStyle = p.color;
                    ctx.fill();

                    // Emoji do player
                    ctx.fillText('👨‍🌾', p.x, p.y);
                    
                    // Se tem galinha, desenha a galinha em cima
                    if (p.hasChicken) {
                        ctx.font = '25px Arial';
                        ctx.fillText('🐔', p.x, p.y - 25);
                    }
                }

                updatePhysics();
                if (timeRemaining > 0) {
                    requestAnimationFrame(draw);
                }
            }
            requestAnimationFrame(draw);

            function endGame() {
                document.getElementById('game-over-modal').style.display = 'block';
                let winner = null;
                let maxScore = -1;
                for(let id in players) {
                    if (players[id].score > maxScore) {
                        maxScore = players[id].score;
                        winner = players[id];
                    }
                }
                
                const winText = document.getElementById('winner-text');
                if (winner && maxScore > 0) {
                    winText.innerHTML = `Vencedor fez ${maxScore} pontos! <br><span style="color:${winner.color}">👨‍🌾</span>`;
                } else {
                    winText.innerText = "Empate ou nenhum ponto!";
                }
            }
        }

        // ================= CÓDIGO DO CLIENTE (CELULAR / CONTROLE) =================
        function initClientMode(hostId) {
            document.getElementById('client-screen').style.display = 'flex';
            const statusEl = document.getElementById('client-status');
            
            const peer = new Peer();
            let conn;

            // O estado dos botões que será enviado ao HOST
            let inputState = {
                up: false,
                down: false,
                left: false,
                right: false,
                action: false
            };

            peer.on('open', () => {
                statusEl.innerText = "Conectando ao PC...";
                conn = peer.connect(hostId, { reliable: false }); // Unreliable para input rápido é melhor

                conn.on('open', () => {
                    statusEl.innerText = "🎮 Controle Ativo! Pegue galinhas!";
                    
                    // Envia inputs 30 vezes por segundo (Loop do controle)
                    setInterval(() => {
                        conn.send({ type: 'input', state: inputState });
                    }, 1000 / 30);
                });

                // Recebe mensagens do Host (feedback)
                conn.on('data', (data) => {
                    if (data.type === 'status') {
                        statusEl.innerText = data.msg;
                        // Vibra se suportado pelo celular
                        if(navigator.vibrate) navigator.vibrate(50);
                    }
                });

                conn.on('close', () => {
                    statusEl.innerText = "❌ Desconectado do PC.";
                });
            });

            // Lógica Touch / Mouse para os botões do Celular
            function bindButton(btnId, actionName) {
                const btn = document.getElementById(btnId);
                
                // Mapeia Touch e Mouse (para testar usando inspect element do navegador)
                const press = (e) => { e.preventDefault(); inputState[actionName] = true; };
                const release = (e) => { e.preventDefault(); inputState[actionName] = false; };

                btn.addEventListener('touchstart', press, {passive: false});
                btn.addEventListener('touchend', release, {passive: false});
                btn.addEventListener('mousedown', press);
                btn.addEventListener('mouseup', release);
                btn.addEventListener('mouseleave', release);
            }

            bindButton('btn-up', 'up');
            bindButton('btn-down', 'down');
            bindButton('btn-left', 'left');
            bindButton('btn-right', 'right');
            bindButton('btn-action', 'action');
        }
    </script>
</body>
</html>
